title: 学习笔记
description: 个人技术学习、资料整理与日常记录
baseurl: ""
url: "https://yifree.github.io/"
timezone: Asia/Shanghai
encoding: utf-8

# 分页
paginate: 12
paginate_path: "/page/:num/"

markdown: kramdown
highlighter: rouge
theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: 1..3

gitalk:
  clientID: YOUR_CLIENT_ID
  clientSecret: YOUR_CLIENT_SECRET
  repo: weekly
  owner: yifree
  admin: [yifree]
  distractionFreeMode: true

umami:
  id: YOUR_UMAMI_ID
  src: https://umami.example.com/script.js