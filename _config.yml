title: 学习笔记
description: 个人技术学习、资料整理与日常记录
baseurl: ""
url: "https://yifree.github.io/"
timezone: Asia/Shanghai
encoding: utf-8

# 分页
paginate: 12
paginate_path: "/page/:num/"

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: 1..3

gitalk:
  # 请在 GitHub 开发者设置中创建 OAuth 应用获取以下信息
  # 步骤：Settings -> Developer settings -> OAuth Apps -> New OAuth App
  # Homepage URL: https://yifree.github.io/
  # Authorization callback URL: https://yifree.github.io/
  clientID: YOUR_CLIENT_ID
  clientSecret: YOUR_CLIENT_SECRET
  repo: yifree.github.io
  owner: yifree
  admin: [yifree]
  distractionFreeMode: true

